name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code du repository
      - uses: actions/checkout@v3

      # 2. Installer Node.js (choisissez la version souhaitée, ici par exemple 16)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      # 3. Installer les dépendances
      - name: Install dependencies
        run: npm ci

      # 4. Construire l'application (adaptez le nom de votre projet)
      - name: Build project
        run: npx nx build fashion-center-map

      # 5. Lancer les tests unitaires (adaptez le nom de votre projet)
      - name: Run tests
        run: npx nx test fashion-center-map
